name: Deploy MkDocs

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/deploy-mkdocs.yml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: pip install properdocs mike mkdocs-material mkdocs-literate-nav "mkdocstrings[python]" pymdown-extensions

      - name: Deploy versioned docs with mike
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            mike deploy --push -F properdocs.yml --update-aliases main latest
            mike set-default --push -F properdocs.yml latest
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            mike deploy --push -F properdocs.yml --update-aliases dev
          fi
