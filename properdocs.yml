site_name: DSync
theme:
  name: material
  palette:
    - scheme: slate
      primary: purple
      accent: deep-purple
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: default
      primary: blue
      accent: indigo

  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true


markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.snippets

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/auto-render.min.js